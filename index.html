    <div class="content">

        <div class="barcode-container">
            <form id="barcode-form" class="barcode-form">
                <label for="search">Barcode scannen</label>
                <div class="barcode-input-wrapper">
                    <input type="text" id="search" name="search" placeholder="Hier scannen..." autofocus

    <!-- SQL.js for local database -->
    <script src="js/sql-wasm.js"></script>
    <script type="module">
        import { OpenFoodFacts } from 'https://esm.sh/@openfoodfacts/openfoodfacts-nodejs';

        const config = {
            locateFile: filename => `js/${filename}`
        };

        let db = null;
        const offClient = new OpenFoodFacts(window.fetch);

        async function initDb() {
            try {
                const SQL = await initSqlJs(config);
                const response = await fetch('saftladen.db');
                if (!response.ok) throw new Error("Database file not found");
                const buf = await response.arrayBuffer();
                db = new SQL.Database(new Uint8Array(buf));
                console.log("Database loaded successfully");
            } catch (err) {
                console.error("Failed to load database:", err);
            }
        }

        initDb().then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            if (searchQuery) {
                document.getElementById('search').value = searchQuery;
                handleSearch();
            }
        });

        // 1.2BETA Search Algorithms
        function cleanString(str) {
            if (!str) return "";
            return str.toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        function levenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function getNumbers(str) {
            if (!str) return [];
            const normalized = str.replace(/,/g, '.');
            const matches = normalized.match(/[0-9]+([.][0-9]+)?/g);
            return matches ? matches.map(Number) : [];
        }

        function hasQuantityMismatch(jtlName, offQuantity) {
            if (!offQuantity || !jtlName) return false;
            const jtlNums = getNumbers(jtlName);
            const offNums = getNumbers(offQuantity);
            if (jtlNums.length === 0 || offNums.length === 0) return false;
            for (const on of offNums) {
                for (const jn of jtlNums) {
                    if (Math.abs(on - jn) < 0.001) return false;
                    if (Math.abs(on - (jn * 1000)) < 0.01) return false;
                    if (Math.abs((on * 1000) - jn) < 0.01) return false;
                }
            }
            return true;
        }

        async function handleSearch(event) {
            if (event) event.preventDefault();
            const searchInput = document.getElementById('search');
            const search = searchInput.value.trim();
            if (!search) return;

            const resultsArea = document.getElementById('results-area');
            resultsArea.innerHTML = '<div class="terminal-container"><div class="terminal-body"><div class="terminal-content">Scanning...</div></div></div>';

            let debugLog = [`Scan: ${search}`];
            let offData = null;
            let offName = "";
            let finalMatch = null;
            let score = 0;

            // 1. API Query (OpenFoodFacts JS SDK)
            try {
                const { data, error } = await offClient.getProductV3(search);
                if (data && data.product) {
                    offData = data.product;
                    const brands = offData.brands || "";
                    const name = offData.product_name_de || offData.product_name || "";
                    if (brands && !name.toLowerCase().includes(brands.toLowerCase())) {
                        let brandShort = brands.split(',')[0].trim();
                        offName = `${brandShort} ${name}`.trim();
                    } else {
                        offName = name.trim();
                    }
                } else if (error) {
                    debugLog.push(`API Warning: ${error}`);
                }
            } catch (err) {
                debugLog.push(`API Error: ${err.message}`);
            }
            debugLog.push(`API: ${offName || "No name found on web"}`);

            // 2. Database Query
            if (db) {
                try {
                    // Direct hit on ArtNr (Barcode is NULL in DB now)
                    const stmtDirect = db.prepare("SELECT a.fVKNetto, b.cName FROM tArtikel a LEFT JOIN tArtikelBeschreibung b ON a.kArtikel = b.kArtikel WHERE a.cArtNr = ?");
                    stmtDirect.bind([search]);
                    if (stmtDirect.step()) {
                        const row = stmtDirect.getAsObject();
                        finalMatch = { name: row.cName, preis: row.fVKNetto };
                        score = 100;
                        debugLog.push("Direct hit: YES");
                    } else {
                        debugLog.push("Direct hit: NO");
                        if (offName) {
                            debugLog.push("Fuzzy started...");
                            const cleanOFF = cleanString(offName);
                            const stmtFuzzy = db.prepare("SELECT b.cName, a.fVKNetto FROM tArtikel a JOIN tArtikelBeschreibung b ON a.kArtikel = b.kArtikel WHERE b.cName IS NOT NULL");
                            
                            while (stmtFuzzy.step()) {
                                const row = stmtFuzzy.getAsObject();
                                const cleanJTL = cleanString(row.cName);
                                if (!cleanJTL) continue;

                                const wordsOFF = offName.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);
                                let matchedWords = 0;
                                const targetLower = row.cName.toLowerCase();
                                wordsOFF.forEach(w => {
                                    if (targetLower.includes(w)) matchedWords++;
                                });
                                const wordScore = wordsOFF.length > 0 ? (matchedWords / wordsOFF.length) * 100 : 0;

                                const lev = levenshtein(cleanOFF, cleanJTL);
                                const maxLen = Math.max(cleanOFF.length, cleanJTL.length);
                                const levScore = maxLen > 0 ? (1 - lev / maxLen) * 100 : 0;

                                const currentScore = (wordScore * 0.78) + (levScore * 0.22);
                                if (currentScore > score) {
                                    score = currentScore;
                                    finalMatch = { name: row.cName, preis: row.fVKNetto };
                                }
                            }
                            stmtFuzzy.free();
                            debugLog.push(`Best Score: ${score.toFixed(1)}%`);
                        }
                    }
                    stmtDirect.free();
                } catch (err) {
                    debugLog.push(`DB ERROR: ${err.message}`);
                }
            }

            const qMismatch = (finalMatch && offData && offData.quantity) ? hasQuantityMismatch(finalMatch.name, offData.quantity) : false;
            if (qMismatch) debugLog.push("WARNING: Quantity Mismatch detected!");

            const isRedTheme = (score < 45 || qMismatch);
            if (isRedTheme) debugLog.push("ALERT: ITEM_NOT_IN_DATABASE mode active.");

            renderResults(isRedTheme, search, finalMatch, offData, offName, score, debugLog);
            searchInput.value = '';
            searchInput.focus();
        }

        function renderResults(isRedTheme, search, finalMatch, offData, offName, score, debugLog) {
            const resultsArea = document.getElementById('results-area');
            const themeClass = isRedTheme ? 'red-alert' : '';

            if (isRedTheme) {
                document.body.classList.add('red-alert-theme');
            } else {
                document.body.classList.remove('red-alert-theme');
            }
            
            let html = `
                <div class="terminal-container ${themeClass}">
                    <div class="terminal-header">
                        <div class="terminal-controls">
                            <span class="control close"></span>
                            <span class="control minimize"></span>
                            <span class="control maximize"></span>
                        </div>
                        <div class="terminal-title">SCAN_RESULT_V1.3_SHOWCASE</div>
                        <div class="terminal-status">
                            <span class="status-indicator"></span>
                            <span>ONLINE</span>
                        </div>
                    </div>
                    <div class="terminal-body">
                        <div class="terminal-content" id="terminal-content">
            `;

            if ((finalMatch && score >= 35) || offData) {
                html += `
                    <div class="terminal-line1">
                        <span class="prompt">root@Saftladen:~$</span>
                        <span class="command">display_product --id ${search}</span>
                    </div>
                    <div class="output">
                        ${isRedTheme ? '<div class="item-not-in-db-banner">ITEM NOT IN JTL DATABASE</div>' : ''}
                        
                        ${offData && offData.image_url ? `
                            <div class="product-image-container">
                                <img src="${offData.image_url}" alt="Product">
                            </div>
                        ` : ''}

                        <div class="cyber-product-name">
                            ${isRedTheme ? (offName || 'UNKNOWN') : (finalMatch ? finalMatch.name : (offName || 'UNKNOWN'))}
                        </div>

                        ${(!isRedTheme && finalMatch) ? `
                            <div class="cyber-price-tag">
                                ${(finalMatch.preis * 1.19).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} €
                            </div>
                        ` : '<div class="cyber-price-tag glitch">NO_PRICE</div>'}

                        ${(!isRedTheme && score > 0) ? `
                            <div class="info-row">
                                <span class="info">► Match Score: ${score.toFixed(1)}%</span>
                            </div>
                        ` : ''}

                        <div class="off-data-grid">
                            <div class="off-item"><span class="off-label">Menge:</span><span class="off-value">${offData ? offData.quantity || "NO_DATA" : "NO_DATA"}</span></div>
                            <div class="off-item"><span class="off-label">Marken:</span><span class="off-value">${offData ? offData.brands || "NO_DATA" : "NO_DATA"}</span></div>
                            <div class="off-item"><span class="off-label">Verpackung:</span><span class="off-value">${offData ? offData.packaging || "NO_DATA" : "NO_DATA"}</span></div>
                            <div class="off-item"><span class="off-label">Kategorien:</span><span class="off-value">${offData ? offData.categories || "NO_DATA" : "NO_DATA"}</span></div>
                            <div class="off-item"><span class="off-label">Labels:</span><span class="off-value">${offData ? offData.labels || "NO_DATA" : "NO_DATA"}</span></div>
                            <div class="off-item"><span class="off-label">Herstellung:</span><span class="off-value">${offData ? offData.manufacturing_places || "NO_DATA" : "NO_DATA"}</span></div>
                            <div class="off-item"><span class="off-label">Läden:</span><span class="off-value">${offData ? offData.stores || "NO_DATA" : "NO_DATA"}</span></div>
                            <div class="off-item"><span class="off-label">Länder:</span><span class="off-value">${offData ? offData.countries || "NO_DATA" : "NO_DATA"}</span></div>
                        </div>

                        <div class="terminal-line">
                            <span class="prompt">root@Saftladen:~$</span>
                            <span class="command">matrix_view</span>
                        </div>
                        <div class="output">
                            <div class="matrix-display" id="matrix-display"></div>
                        </div>
                    </div>
                `;
            } else {
                html += `<div class="output"><span class="error">✗ PRODUCT_NOT_FOUND</span></div>`;
            }

            html += `
                        <div class="terminal-line">
                            <span class="prompt">root@Saftladen:~$</span>
                            <span class="command">show_logs --monitor</span>
                        </div>
                        <div class="output">
                            ${debugLog.map(log => `<div class="success">✓ ${log}</div>`).join('')}
                        </div>

                        <div class="terminal-line">
                            <span class="prompt">root@Saftladen:~$</span>
                            <span class="command" id="typing-command"></span>
                            <span class="cursor">█</span>
                        </div>
                    </div>
                </div>
                <div class="terminal-footer">
                    <div class="footer-info">
                        <span>CONNECTION: SECURE</span>
                        <span>UPTIME: ${new Date().toLocaleTimeString()}</span>
                        <span>v1.3 Showcase</span>
                    </div>
                </div>
            `;

            resultsArea.innerHTML = html;
            if (window.cyberTerminalInstance) {
                window.cyberTerminalInstance.refresh(); // Staggered animations for new results
            }
        }

        document.getElementById('barcode-form').addEventListener('submit', handleSearch);
    </script>
    <script src="js/cyber-terminal.js"></script>
    <script src="js/menu.js"></script>
